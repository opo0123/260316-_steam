<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스팀</title>
    <link rel="stylesheet" href="css/steam.css" />
  </head>
  <body>
    <!-- 전체 영역 -->
    <div class="wrap">
      <!-- 헤더 -->
       <header>
        <!-- 헤더 top -->
         <div class="header-top">
            <!-- 로고 -->
             <div class="logo">
                <img src="/images/logo.png" alt="logo">
             </div>
             <!-- 헤더 메뉴 -->
             <div class="header-menu">
                <ul>
                <li class="support"><a href="#">SUPPORT</a></li>
                <li class="about"><a href="#"></a>ABOUT</a></li>
                <li class="community"><a href="#"></a>COMMUNITY</a></li>
                <li class="store"><a href="#"></a>STORE</a></li>
                </ul>
             </div>
             <!-- 헤더 오른쪽 -->
              <div class="header-right">
                <!-- 다운 버튼 -->
                <button type="submit">Install Steam</button>
                <!-- 로그인, 언어 설정 (사이에 구분선 넣기)-->
                 <p class="sign">sign in</p>
                 <p class="lang">language</p>
              </div>
         </div>
         <!-- 헤더 아래 -->
         <div class="header-bottom">
            <!-- 메뉴 2 -->
            <ul>
                <li class="browse"><a href="#">browse</a></li> 
                <li class="Recommandation"><a href="#"></a>recommandation</a></li> 
                <li class="categories"><a href="#"></a>Categories</a></li> 
                <li class="hardware"><a href="#"></a>Hardware</a></li> 
                <li class="way-to-play"><a href="#"></a>Way to Play</a></li> 
                <li class="special-sections"><a href="#"></a>Special Sections</a></li> 
            </ul>
            <!-- 검색창 (버튼 추가하기)-->
            <div class="search">
                <input type="text" placeholder="Search the store">
            </div>
         </div>
       </header>
    </div>
  </body>
</html>
